<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Quicksand", sans-serif;
            min-height: 83vh;
            background: linear-gradient(to bottom,
                    #daf3f5 5%,
                    #f7e9ce 50%);
        }

        @media screen and (max-width:1024px) {
            .savings-content{
                flex-direction: column-reverse;
            }
        }

         @media screen and (max-width:575px){
            .logo{
               width: 250px !important; 
               height: 200px !important;
               margin-left: 80px;
            }
            .head{
                margin-left: 80px;
            }
            .para{
                margin-left: 55px !important;
            }
            .btn-fund{
                margin-left: 80px;
                width: 200px !important;
            }
            .back-link{
                margin-left: 150px !important;
            }
        }

        @media screen and (max-width:403px){
            .logo{
               width: 250px !important; 
               height: 200px !important;
               margin-left: 65px;
            }
            .head{
                margin-left: 70px;
            }
            .para{
                margin-left: 55px !important;
            }
            .btn-fund{
                margin-left: 80px;
                width: 200px !important;
            }
            .back-link{
                margin-left: 150px !important;
            }
        }
        .savings-content {
            margin-top: 155px;
            gap: 170px;
        }

        .amount-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .currency {
            font-size: 2.8rem;
            font-weight: 800;
            color: #0d2560;
            text-decoration: line-through;
            text-decoration-color: #0d2560;
            line-height: 1;
        }

        .amount-input {
            font-size: 3.5rem;
            font-weight: 800;
            color: #0d2560;
            border: none;
            outline: none;
            background: transparent;
            width: 180px;
            text-align: left;
        }

        .amount-input::-webkit-outer-spin-button,
        .amount-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .amount-input[type=number] {
            -moz-appearance: textfield;
        }

        .btn-fund {
            width: 100%;
            padding: 16px;
            background: #5b8dee;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .btn-fund:hover {
            background: #3a6fdf;
        }

        .back-link {
            color: #5b8dee;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            background: none;
            border: none;
            margin-left: 170px;
            text-decoration: none;
            display: inline-block;
        }

        .back-link:hover {
            text-decoration: underline;
        }
        .logo{
            width: 500px;
            height: 250px;
        }
        .head{
             color:  #0d2560;
        }
        .para{
            color: #677797;
            font-weight: 600;
        }
         #successOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f7fa;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #successOverlay img {
            width: clamp(120px, 40vw, 250px);
            height: auto;
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="d-flex savings-content">
            <div class="left-content">
                <h1 class="head"><span class="mx-4">Start investing by </span><br>funding your wallet</h1>
                <p class="mt-5 mx-4 para">How much would you like to start with?</p>
                <div class="amount-wrapper">
                    <span class="currency">₦</span>
                    <input type="number" id="amountInput" class="amount-input" placeholder="" min="0">
                </div>
                <div id="display"></div>
                <div id="show"></div>
                <button class="btn-fund" onclick="fund()">Fund wallet</button>
                <a href="welcome.html" class="back-link">Back</a>
            </div>

            <img src="Images/investmentlogo.png" alt="" class="logo">
        </div>
    </main>
     <div id="successOverlay">
        <img src="Images/cowrywisegif.gif" alt="Cowrywise">
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    const amountInput = document.getElementById('amountInput');
    const display = document.getElementById('display');
    const show = document.getElementById('show');

    const fund = () => {
        const inputValue = amountInput.value.trim();
        const amount = Number(inputValue);

        display.innerHTML = '';
        show.innerHTML = '';
        display.style.display = 'block';
        show.style.display = 'block';

        if (inputValue === '') {
            display.innerHTML = `<div class="alert p-2 text-danger text-left text-center bg-danger-subtle border-danger" role="alert" style="font-size:small">*Please fill in the empty input!</div>`;
            setTimeout(() => {
                display.innerHTML = '';
                display.style.display = 'none';
            }, 1500);
        } else if (amount < 1000) {
            show.innerHTML = `<div class="alert p-2 text-danger text-left text-center bg-danger-subtle border-danger" role="alert" style="font-size:small">*A minimum of ₦1000 is required!</div>`;
            setTimeout(() => {
                show.innerHTML = '';
                show.style.display = 'none';
            }, 1500);
        } else {
            const handler = PaystackPop.setup({
                key: 'pk_test_ac2e332abeeeb2fba0cac07d430a628fe3003d0d',
                email: 'testuser@example.com',
                amount: `${amount * 100}`,
                currency: 'NGN',
                ref: '' + Math.floor((Math.random() * 1000000000) + 1),
                callback: function (response) {
                    document.getElementById('successOverlay').style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2500);
                },
                onClose: function () {
                    alert('Payment window closed.');
                }
            });

            handler.openIframe();
        }
    }
</script>

</html>
