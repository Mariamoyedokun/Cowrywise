<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedValue = localStorage.getItem('sharedValue');

        if (savedValue) {
            const displayElement = document.getElementById('display');
            displayElement.innerHTML = `<p class="" >Enter the 6-digit code we sent to <span class=" fs-4" style="color:#4f6b9b; font-weight:700 " >${savedValue}</span></p>`
        }
    })

    function next(){
        const digits= document.getElementById('code').value
        const show= document.getElementById('show')
        const displayShow= document.getElementById('showTwo')
        if (digits==='') {
             show.innerHTML = `<div class= "alert p-2 text-danger text-left" role="alert" style="font-size:small">*Please enter the code sent to the email address provided!</div>`
            setTimeout(() => {
                show.style.display = 'none'
            }, 1500);
        }
        else if (digits.length < 6 || digits.length > 6) {
              displayShow.innerHTML = `<div class= "alert p-2 text-danger text-left" role="alert" style="font-size:small">*Please enter the valid 6-digits code sent!</div>`
            setTimeout(() => {
                displayShow.style.display = 'none'
            }, 1500);
        }
        else{
            window.location.href='create.html'
        }
    }
</script>
