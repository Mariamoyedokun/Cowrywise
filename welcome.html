<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Quicksand", sans-serif;
            min-height: 83vh;
            background: linear-gradient(to bottom,
                    #daf3f5 5%,
                    #f7e9ce 50%);
        }

        .welcome-content {
            margin-top: 140px;
            gap: 60px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .welcome-content > div:first-child {
            max-width: 580px;
        }

        .option-card {
            cursor: pointer;
            border-radius: 16px;
            border: 2.5px solid transparent;
            background: #fff;
            transition: border-color 0.2s, transform 0.15s;
            user-select: none;
            min-height: 260px;
        }

        .card1 {
            background-color: #ceebfd;
        }

        .card2 {
            background-color: #dfdae7;
        }

        .option-card:hover {
            transform: translateY(-2px);
        }

        .option-card.selected {
            border-color: #1e90d6;
        }

        .option-card.selected .card-label1,
        .option-card.selected .card-label2 {
            color: #1e90d6;
        }

        .card-label1,
        .card-label2 {
            font-size: 18px;
            font-weight: 700;
            display: block;
            margin-bottom: 0.8rem;
        }

        .card-label1 {
            color: #2f79a7;
        }

        .card-label2 {
            color: #7653ad;
        }

        .img-wrap {
            border-radius: 30px;
            overflow: hidden;
            height: 180px;
            width: 100%;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .continue-btn {
            background: #1e90d6;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 30px;
            font-size: 15px;
            font-weight: 600;
            opacity: 0.4;
            margin-top: 25px;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.15s;
            width: 260px;
            max-width: 100%;
        }

        .continue-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .continue-btn.active:hover {
            transform: scale(1.02);
        }

        .continue-btn.active:active {
            transform: scale(0.98);
        }

        .trust-line {
            font-size: 14px;
            color: #6b757e;
            font-weight: 500;
            margin-top: 15px;
            text-align: center;
            max-width: 520px;
        }

        .trust-line .heart {
            color: #1e90d6;
            margin-right: 6px;
        }

        .sec {
            font-size: 14px;
            color: #6b757e;
            margin: 0 auto;
            text-align: center;
            padding: 0 12px;
        }

        .sec p {
            margin: 0;
        }

        @media (max-width: 992px) {
            .welcome-content {
                margin-top: 120px;
                gap: 40px;
            }

            .welcome-content > div:first-child {
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .welcome-content {
                flex-direction: column;
                align-items: center;
            }

            .option-card {
                min-height: auto;
            }

            .row.g-3 {
                width: 100%;
            }

            .col-6 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .img-wrap {
                height: 170px;
            }

            .continue-btn {
                width: 100%;
                max-width: 360px;
            }

            .trust-line {
                font-size: 13px;
                padding: 0 0.5rem;
            }

            .sec {
                margin-top: 20px;
            }
        }

        @media (max-width: 576px) {
            body {
                min-height: auto;
            }

            .welcome-content {
                margin-top: 80px;
                gap: 24px;
                padding: 0 12px;
            }

            .card-label1,
            .card-label2 {
                font-size: 16px;
            }

            .img-wrap {
                height: 150px;
            }

            .continue-btn {
                padding: 12px 22px;
            }

            .trust-line {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="d-flex welcome-content">
            <div>
                <h5 id="display"></h5>
                <h1 class="mt-2">What would you <br>like to do?</h1>
            </div>

            <div class="d-flex flex-column mx-auto align-items-center gap-4">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="option-card card1 p-3" id="card-savings" onclick="selectOption('savings')">
                            <span class="card-label1 d-block mb-2">Savings</span>
                            <div class="img-wrap">
                                <img src="Images/savingsbox.webp" alt="Savings" />
                            </div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="option-card card2 p-3" id="card-investments" onclick="selectOption('investments')">
                            <span class="card-label2 d-block mb-2">Investments</span>
                            <div class="img-wrap">
                                <img src="Images/investmentbasket.webp" alt="Investments" />
                            </div>
                        </div>
                    </div>
                </div>

                <button class="continue-btn" id="continue-btn" onclick="handleContinue()">Continue</button>

                <p class="trust-line text-center mb-0">
                    <span class="heart"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24">
                            <path d="M0 0h24v24H0z" fill="none" />
                            <path fill="currentColor"
                                d="m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z" />
                        </svg>
                    </span>
                    <span id="trust-text">Over 2 million people build wealth on Cowrywise.</span>
                </p>
            </div>
        </div>
          <div class="justify-content-center d-flex mt-5 sec">
            <p class="mt-5">LINCESED BY THE SEC</p>
          </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selected = null;

        const messages = {
            savings: 'Build discipline and earn competitve returns.',
            investments: 'Invest in stocks,mutual funds and watch your money grow.'
        };

        const destinations = {
            savings: 'savings.html',
            investments: 'investment.html'
        };

        function selectOption(option) {
            selected = option;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-' + option).classList.add('selected');
            document.getElementById('continue-btn').classList.add('active');
            document.getElementById('trust-text').textContent = messages[option];
        }

        function handleContinue() {
            if (!selected) return;
            window.location.href = destinations[selected];
        }

        document.addEventListener('DOMContentLoaded', () => {
            const firstName = localStorage.getItem('firstName');
            if (firstName) {
                document.getElementById('display').textContent = 'Welcome, ' + firstName + '!';
            }
        });
    </script>
</body>

</html>
